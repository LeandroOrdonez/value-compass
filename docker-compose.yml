services:
  # API Gateway (Nginx)
  api-gateway:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8000:80"
    depends_on:
      - data-service
      - valuation-service
      - user-service
      - report-service

  # Backend services
  data-service:
    build:
      context: ./services/data_service
    restart: unless-stopped
    volumes:
      - ./services/data_service:/app
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:?POSTGRES_DB must be set}
      - DATA_SOURCE=${DATA_SOURCE:-yahoo}
      - ENVIRONMENT=${ENVIRONMENT:-development}

  valuation-service:
    build:
      context: ./services/valuation_service
    restart: unless-stopped
    volumes:
      - ./services/valuation_service:/app
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      data-service:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:?POSTGRES_DB must be set}
      - DATA_SERVICE_URL=${DATA_SERVICE_URL:-http://data-service:8000}
      - ENVIRONMENT=${ENVIRONMENT:-development}

  user-service:
    build:
      context: ./services/user_service
    restart: unless-stopped
    volumes:
      - ./services/user_service:/app
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:?POSTGRES_DB must be set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - ENVIRONMENT=${ENVIRONMENT:-development}

  report-service:
    build:
      context: ./services/report_service
    restart: unless-stopped
    volumes:
      - ./services/report_service:/app
      - report_data:/app/reports
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      data-service:
        condition: service_started
      valuation-service:
        condition: service_started
      user-service:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:?POSTGRES_DB must be set}
      - DATA_SERVICE_URL=${DATA_SERVICE_URL:-http://data-service:8000}
      - VALUATION_SERVICE_URL=${VALUATION_SERVICE_URL:-http://valuation-service:8000}
      - USER_SERVICE_URL=${USER_SERVICE_URL:-http://user-service:8000}
      - ENVIRONMENT=${ENVIRONMENT:-development}

  # Frontend
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}

  # Database
  db:
    image: postgres:14
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER must be set}
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB must be set}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    # Bind to localhost only so the database is not exposed on the network.
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  postgres_data:
  report_data: